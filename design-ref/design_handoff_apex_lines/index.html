<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>APEX Lines — Driving Course Ranking</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background: #0a0c11;
    background-image:
      radial-gradient(ellipse 50% 40% at 20% 20%, rgba(79,70,229,0.10), transparent 60%),
      radial-gradient(ellipse 40% 30% at 90% 80%, rgba(255,214,10,0.06), transparent 60%);
    color: #fff;
    font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
    overflow: hidden;
  }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 24px; box-sizing: border-box;
  }
  .stage-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 64px 64px;
    pointer-events: none;
  }
  .meta {
    position: fixed; left: 24px; bottom: 18px;
    font: 500 11px/1.4 Pretendard;
    color: #5A5F6E; letter-spacing: 0.08em;
  }
  .meta strong { color: #B1B6C4; font-weight: 700; }
  .right-meta {
    position: fixed; right: 24px; bottom: 18px;
    font: 500 11px/1.4 Pretendard;
    color: #5A5F6E; letter-spacing: 0.16em; text-transform: uppercase;
  }
</style>
</head>
<body>
  <div id="stage">
    <div class="stage-grid"></div>
    <div id="root"></div>
  </div>
  <div class="meta"><strong>APEX LINES</strong> — Drive Course Ranking · Working prototype</div>
  <div class="right-meta">v0.1 · Build 06 · KR</div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function Root() {
      const [scale, setScale] = useState(1);
      useEffect(() => {
        const fit = () => {
          const w = window.innerWidth, h = window.innerHeight;
          const targetW = 402, targetH = 874;
          const s = Math.min((w - 80) / targetW, (h - 80) / targetH, 1.05);
          setScale(s);
        };
        fit();
        window.addEventListener('resize', fit);
        return () => window.removeEventListener('resize', fit);
      }, []);
      return (
        <div style={{
          width: 402, height: 874,
          transform: `scale(${scale})`,
          transformOrigin: 'center center',
        }}>
          <IOSDevice width={402} height={874} dark>
            <App/>
          </IOSDevice>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
  </script>
</body>
</html>

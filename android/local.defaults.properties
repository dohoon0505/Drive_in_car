# Default values for secrets-gradle-plugin.
# 실제 값은 android/local.properties (gitignored) 에 둔다.

# Naver Maps SDK 인증 (NCP Application key → Client ID)
NAVER_MAP_CLIENT_ID=PUT_NAVER_MAP_CLIENT_ID_IN_LOCAL_PROPERTIES

# Google Maps API key — Phase 2B Roads API (Snap to Roads) 용으로 BuildConfig 에만 노출.
# Manifest 에는 더 이상 주입되지 않음.
MAPS_API_KEY=PUT_GOOGLE_MAPS_API_KEY_IN_LOCAL_PROPERTIES
